name: Execute and save notebooks

on:
  push:
    paths:
      - "examples/**.ipynb"
      - "examples/**"
  workflow_dispatch:

jobs:
  run-notebooks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r examples/requirements.txt

      - name: Execute notebooks (nbconvert)
        run: |
          find examples -name "*.ipynb" | while read nb; do
            jupyter nbconvert --to notebook --execute "$nb" --inplace --ExecutePreprocessor.timeout=600
          done

      - name: Commit executed notebooks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add examples/**/*.ipynb || true
          if ! git diff --staged --quiet; then
            git commit -m "ci: execute notebooks and save outputs [skip ci]" || true
            git push origin HEAD:${{ github.ref_name }} || true
          else
            echo "No changes in notebooks"
          fi
